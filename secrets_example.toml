# SALIN file ini jadi ".streamlit/secrets.toml" lalu isi dengan data asli dari
# Google Cloud Console (lihat panduan lengkap di README.md).
# JANGAN pernah upload secrets.toml yang sudah terisi ke GitHub publik.

SPREADSHEET_ID = "isi_dengan_id_spreadsheet_anda"

[gcp_service_account]
type = "service_account"
project_id = "isi-project-id"
private_key_id = "isi-private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\nISI_PRIVATE_KEY_DI_SINI\n-----END PRIVATE KEY-----\n"
client_email = "nama-service-account@isi-project-id.iam.gserviceaccount.com"
client_id = "isi-client-id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "isi-client-x509-cert-url"
